name: Publish to npm (JS/TS)

on:
  push:
    branches: [main, master]
    tags: ['npm-v*']
  pull_request:
    branches: [main, master]

jobs:
  build-js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get npm version
        run: |
          if [ -f package.json ]; then
            cat package.json
          else
            echo '{"name":"@egtronic/js","version":"1.0.0"}' > package.json
          fi

      - name: Install dependencies
        run: pnpm install || npm install

      - name: Build
        run: pnpm build || npm run build || echo "No build script"

      - name: Lint
        run: pnpm lint || npm run lint || echo "No lint script"

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-js
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/npm-v') || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install || npm install

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > .npmrc
          npm publish --access public || echo "No package.json to publish"

      - name: Publish @egtronic packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > .npmrc
          # Publish each package in packages/
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              npm publish "$dir" --access public || true
            fi
          done 2>/dev/null || echo "No packages to publish"

  release:
    runs-on: ubuntu-latest
    needs: publish-npm
    if: startsWith(github.ref, 'refs/tags/npm-v')

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}